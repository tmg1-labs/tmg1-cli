name: Release

# タグ push (v*) をトリガーに、4ターゲットのバイナリをビルドして
# GitHub Release に添付する。クロスコンパイルは行わず、各OSのネイティブ
# ホスト型ランナー(linux-aarch64 は ubuntu-24.04-arm)で cc クレート経由の
# C++ コーデックビルドを完結させる。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: ubuntu-24.04-arm
            target: linux-aarch64
          - os: macos-latest
            target: macos-aarch64
          - os: windows-latest
            target: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Package binary
        shell: bash
        run: |
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then ext=".exe"; fi
          cp "target/release/tmg1$ext" "tmg1-${{ matrix.target }}$ext"

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then ext=".exe"; fi
          gh release upload "${{ github.ref_name }}" "tmg1-${{ matrix.target }}$ext" --clobber
